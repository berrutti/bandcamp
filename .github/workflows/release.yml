name: Release Extension

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: yarn install --frozen-lockfile

      - run: yarn build

      - name: Sync manifest version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          jq --arg v "$VERSION" '.version = $v' extension/manifest.json > extension/manifest.tmp.json
          mv extension/manifest.tmp.json extension/manifest.json

      - name: Zip extension
        run: zip -r bandcamp-utils.zip extension/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: bandcamp-utils.zip
